{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-6 relative">
    <div class="absolute inset-0 z-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjA1LCAxODAsIDIxOSwgMC4yKSIvPjwvc3ZnPg==')] [mask-image:linear-gradient(to_bottom,white,transparent)]"></div>

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 z-10 animate-fade-in shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-pastel-primary to-pastel-accent"></div>
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pastel-dark to-purple-600 mb-2">Create Account</h2>
            <p class="text-gray-500 text-sm">Start solving math effortlessly today</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.signup') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-user"></i>
                    </div>
                    <input type="text" name="username" required placeholder="MathGenius" 
                           class="w-full glass-input rounded-2xl py-2.5 pl-11 pr-4 text-gray-800 placeholder-gray-400">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input type="email" name="email" required placeholder="you@example.com" 
                           class="w-full glass-input rounded-2xl py-2.5 pl-11 pr-4 text-gray-800 placeholder-gray-400">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full glass-input rounded-2xl py-2.5 pl-11 pr-4 text-gray-800 placeholder-gray-400">
                </div>
            </div>
            
            <button type="submit" class="w-full py-3 rounded-2xl bg-gradient-to-r from-pastel-primary to-pastel-accent text-white font-medium shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all mt-4 border border-transparent hover:border-white/50">
                Create Account
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm">
            <p class="text-gray-600">Already have an account? 
                <a href="{{ url_for('auth.login') }}" class="text-purple-600 font-semibold hover:underline">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
